# four_basic_players.yaml
# Runs a single Catan game with four BasicPlayer bots.
#
# Usage:
#   python -m catan.run catan/examples/four_basic_players.yaml

# 16-character hex game ID written to the log file name.
# Omit this field to auto-generate a fresh ID each run.
# game_id: a1b2c3d4e5f6g7h8

# Master RNG seed for board generation and dice.
# Omit (or set to null) for a non-deterministic game.
seed: 42

# Exactly 4 player slots.
# type: name registered in catan/players/registry.py ("basic" → BasicPlayer)
# seed: forwarded to the player constructor for per-player randomness
players:
  - type: basic
    seed: 0
  - type: basic
    seed: 1
  - type: basic
    seed: 2
  - type: basic
    seed: 3

limits:
  # Safety-valve: game declared inconclusive if nobody wins within this many turns.
  max_turns: 500
  # How many invalid (or timed-out) actions a player may return per opportunity
  # before the engine forces a default action.
  max_invalid_actions: 3

timeouts_ms:
  # Wall-clock limits per player-action opportunity (milliseconds).
  # Set a field to 0 to disable enforcement for that phase.
  setup: 500         # settlement + road placement during setup
  pre_roll: 500      # RollDice or PlayKnight before the dice roll
  post_roll: 500     # main-turn actions (Build, BankTrade, Pass, …)
  discard: 500       # discarding after a 7 is rolled
  move_robber: 500   # placing the robber (after 7 or Knight)
  respond_trade: 200 # responding to another player's trade proposal

# Directory where <game_id>.jsonl and index.jsonl are written.
log_dir: tmp/games
